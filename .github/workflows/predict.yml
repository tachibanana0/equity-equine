name: EquityEquine Daily Prediction

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) --- レース前の出走表確定後に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (空白で当日)"
        required: false

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
  WORKER_PREDICT_URL: ${{ secrets.WORKER_PREDICT_URL }}
  API_SECRET: ${{ secrets.API_SECRET }}

jobs:
  scrape-and-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Setup DB tables (first run)
        run: python scripts/setup_tables.py

      - name: Scrape race entries
        run: |
          DATE="${{ inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y-%m-%d)
          fi
          python scripts/scrape_race.py --date "$DATE" --output scraped_data.json

      - name: Structure with V4 Flash
        run: |
          python scripts/structure_with_flash.py \
            --input scraped_data.json \
            --output structured_data.json

      - name: Save to Turso & trigger prediction
        run: |
          python scripts/save_and_predict.py --input structured_data.json

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: race-data-${{ github.run_id }}
          path: |
            scraped_data.json
            structured_data.json
          retention-days: 7

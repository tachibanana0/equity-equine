name: EquityEquine Results Collection

on:
  schedule:
    # 毎日 JST 20:00 (UTC 11:00) --- レース終了後
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (空白で当日)"
        required: false
      race_id:
        description: "特定レースID (空白で全未確定)"
        required: false

env:
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

jobs:
  collect-results:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect results
        run: |
          DATE="${{ inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y-%m-%d)
          fi
          EXTRA=""
          if [ -n "${{ inputs.race_id }}" ]; then
            EXTRA="--race-id ${{ inputs.race_id }}"
          fi
          python scripts/scrape_results.py --date "$DATE" $EXTRA

name: EquityEquine Daily Prediction

on:
  schedule:
    - cron: "0 0 * * *"  # JST 9:00
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (空白で翌日)"
        required: false
      race_ids:
        description: "特定レースID (空白で全レース、カンマ区切りで複数指定)"
        required: false

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
  API_SECRET: ${{ secrets.API_SECRET }}
  ENRICH_WORKER_URL: https://equity-equine-worker.tachibanananana.workers.dev

jobs:
  scrape-and-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "target=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "target=$(TZ=Asia/Tokyo date -d 'tomorrow' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Step 1 - Scrape race entries (race.netkeiba.com only, fast)
        id: scrape
        run: |
          ARGS="--date ${{ steps.date.outputs.target }}"
          if [ -n "${{ inputs.race_ids }}" ] && [ "${{ inputs.race_ids }}" != "first" ]; then
            ARGS="$ARGS --race-ids ${{ inputs.race_ids }}"
          fi
          python scripts/scrape_entries.py $ARGS --output scraped_data.json
          if [ ! -s scraped_data.json ] || [ "$(cat scraped_data.json)" = "[]" ]; then
            echo "no_races=true" >> $GITHUB_OUTPUT
          else
            echo "no_races=false" >> $GITHUB_OUTPUT
            HORSES=$(python3 -c "import json; races=json.load(open('scraped_data.json')); print(sum(len(r.get('horses',[])) for r in races))")
            echo "horse_count=$HORSES" >> $GITHUB_OUTPUT
          fi

      - name: Step 2 - Enrich horses via Worker (SP db.sp.netkeiba.com)
        if: steps.scrape.outputs.no_races == 'false'
        run: |
          ARGS="--input scraped_data.json --delay 1.0 --past-limit 5"
          if [ -n "${{ inputs.race_ids }}" ] && [ "${{ inputs.race_ids }}" != "first" ]; then
            ARGS="$ARGS --race-ids ${{ inputs.race_ids }}"
          fi
          python scripts/enrich_horses.py $ARGS

      - name: Step 3 - Save entries to Turso DB
        if: steps.scrape.outputs.no_races == 'false'
        run: python scripts/save_and_predict.py --input scraped_data.json --skip-predict

      - name: Step 4 - Predict with V4 Flash
        if: steps.scrape.outputs.no_races == 'false'
        run: |
          if [ -n "${{ inputs.race_ids }}" ] && [ "${{ inputs.race_ids }}" = "first" ]; then
            FIRST_ID=$(python3 -c "import json; d=json.load(open('scraped_data.json')); print(d[0]['race_id'])")
            python scripts/predict_v4flash.py --input scraped_data.json --race-id "$FIRST_ID"
          elif [ -n "${{ inputs.race_ids }}" ]; then
            python scripts/predict_v4flash.py --input scraped_data.json --race-id "${{ inputs.race_ids }}"
          else
            python scripts/predict_v4flash.py --input scraped_data.json
          fi
